name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  source_of_truth_guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure deprecated bin path is not reintroduced
        run: |
          if [ -e bin ]; then
            echo "Error: deprecated path 'bin' exists. Use root src/ and frontend/ as canonical source-of-truth."
            exit 1
          fi
          if git ls-files --error-unmatch bin >/dev/null 2>&1; then
            echo "Error: deprecated path 'bin' is tracked in git index."
            exit 1
          fi

  backend:
    runs-on: ubuntu-latest
    needs: source_of_truth_guard
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: ./mvnw -Dmaven.repo.local=.m2repo test

  frontend:
    runs-on: ubuntu-latest
    needs: source_of_truth_guard
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
