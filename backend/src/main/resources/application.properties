# Smart Campus Operations Hub — Application Properties

spring.application.name=${APP_NAME:smart-campus-hub}
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/}

# ─── MongoDB ──────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_campus}
spring.data.mongodb.auto-index-creation=true

# ─── File Upload ────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# ─── CORS ───────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ─── JWT Configuration ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── OAuth2 Google ──────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
app.oauth.success-url=${GOOGLE_OAUTH_SUCCESS_URL:http://localhost:3000/auth/callback}
app.oauth.failure-url=${GOOGLE_OAUTH_FAILURE_URL:http://localhost:3000/login?error=oauth}

# ─── Dev Admin Bootstrap ────────────────────────────────────────────────────
app.dev-admin.enabled=${DEV_ADMIN_ENABLED:false}
app.dev-admin.email=${DEV_ADMIN_EMAIL:}
app.dev-admin.name=${DEV_ADMIN_NAME:Admin User}

# ─── Logging (Debug Mode) ──────────────────────────────────────────────────
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.springframework.security=DEBUG
