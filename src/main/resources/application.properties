spring.application.name=smart-campus
spring.config.import=optional:file:.env[.properties]

app.database.name=${DB_NAME:smart_campus}
app.database.admin-database=${DB_ADMIN_DATABASE:postgres}
app.database.auto-create=${DB_AUTO_CREATE:true}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/${app.database.name}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

app.oauth2.google.enabled=${GOOGLE_OAUTH_ENABLED:false}
app.oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
app.oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth2.google.api-key=${GOOGLE_API_KEY:}
app.oauth2.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:{baseUrl}/login/oauth2/code/google}
app.oauth2.google.authorization-url=${GOOGLE_OAUTH_AUTHORIZATION_URL:/oauth2/authorization/google}

app.oauth2.google.frontend-success-url=${GOOGLE_OAUTH_SUCCESS_URL:http://localhost:5173/?oauth2=success}
app.oauth2.google.frontend-failure-url=${GOOGLE_OAUTH_FAILURE_URL:http://localhost:5173/?oauth2=error}
app.oauth2.google.dev-admin-shortcut-enabled=${GOOGLE_DEV_ADMIN_SHORTCUT_ENABLED:false}
app.oauth2.google.dev-admin-email=${GOOGLE_DEV_ADMIN_EMAIL:admin@smartcampus.local}
app.oauth2.google.dev-admin-name=${GOOGLE_DEV_ADMIN_NAME:Campus Admin}

app.seed.users.enabled=${APP_USER_SEED_ENABLED:true}
app.seed.demo.enabled=${APP_DEMO_SEED_ENABLED:true}

server.port=${SERVER_PORT:8080}
